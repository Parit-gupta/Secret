<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday &#x1F496;</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Dancing+Script:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== CSS VARIABLES ===== */
      :root {
        --rose: #f4a0b5;
        --blush: #f9c5d1;
        --lavender: #c9b8e8;
        --peach: #ffd6b0;
        --deep: #5c3358;
        --bg-body: #fff8f2;
        --p1-a: #ffe4ef;
        --p1-b: #f3d8f7;
        --p1-c: #d8e8ff;
        --p1-d: #ffe8d6;
        --p2-a: #fff0f7;
        --p2-b: #f5eeff;
        --p2-c: #eef5ff;
        --text-main: #3d2040;
        --text-sub: #5c3358;
        --card-bg: #fdf0f7;
        --card-border: rgba(244, 160, 181, 0.25);
        --card-shadow: rgba(180, 100, 160, 0.15);
        --card-shadow-h: rgba(180, 100, 160, 0.3);
        --modal-bg: #fff8f2;
        --modal-overlay: rgba(40, 10, 50, 0.7);
        --toggle-bg: rgba(255, 255, 255, 0.5);
        --toggle-border: #f9c5d1;
        --toggle-color: #3d2040;
        --timeline-text: #3d2040;
        --hmsg-color: #5c3358;
        --dot-inactive: #f9c5d1;
        --collage-veil: rgba(255, 245, 252, 0.6);
        --hero-band: rgba(255, 255, 255, 0.22);
        --hero-band-b: rgba(255, 255, 255, 0.3);
        --ff-d: "Playfair Display", serif;
        --ff-e: "Cormorant Garamond", serif;
        --ff-s: "Dancing Script", cursive;
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
      }
      body.dark {
        --bg-body: #130a1c;
        --p1-a: #2a0a1e;
        --p1-b: #1e0a30;
        --p1-c: #0a1228;
        --p1-d: #1e100a;
        --p2-a: #1a0826;
        --p2-b: #120820;
        --p2-c: #0d0818;
        --text-main: #f2e4fa;
        --text-sub: #d8b8f0;
        --card-bg: #2a1040;
        --card-border: rgba(201, 184, 232, 0.22);
        --card-shadow: rgba(100, 50, 140, 0.4);
        --card-shadow-h: rgba(140, 80, 180, 0.55);
        --modal-bg: #1c0c2c;
        --modal-overlay: rgba(8, 3, 18, 0.85);
        --toggle-bg: rgba(60, 20, 90, 0.65);
        --toggle-border: rgba(201, 184, 232, 0.45);
        --toggle-color: #f2e4fa;
        --timeline-text: #e8d4f8;
        --hmsg-color: #d8b8f0;
        --dot-inactive: rgba(201, 184, 232, 0.35);
        --collage-veil: rgba(10, 3, 20, 0.65);
        --hero-band: rgba(20, 8, 35, 0.45);
        --hero-band-b: rgba(201, 184, 232, 0.18);
      }

      /* ===== RESET ===== */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      * {
        transition:
          background-color 0.4s ease,
          border-color 0.4s ease,
          color 0.35s ease,
          box-shadow 0.4s ease;
      }
      /* Fast transitions on motion elements */
      .page,
      .gallery-card,
      .timeline-item,
      .story-block,
      .collage-tile,
      .btn-enter,
      .btn-next,
      .btn-back,
      .btn-confetti,
      #cursor,
      #cursor-trail,
      .float-heart,
      .wave-bar,
      .confetti-piece {
        transition-property:
          opacity, transform, background-color, border-color, box-shadow, color,
          filter;
      }

      /* ===== HTML / BODY =====
   Body is the ONE scroll container.
   Pages are display:none (collapsed) or display:block (visible).
   This eliminates ALL blank space / ghost height bugs. */
      html {
        height: 100%;
        overflow-x: hidden;
      }
      body {
        font-family: var(--ff-e);
        background: var(--bg-body);
        color: var(--text-main);
        cursor: none;
        overflow-x: hidden;
        overflow-y: auto;
        transition:
          background-color 0.45s ease,
          color 0.35s ease;
      }

      /* ===== PAGE SYSTEM =====
   display:none = 0 height, 0 space.
   display:block = full natural flow.
   Never use position:fixed or opacity tricks — they keep height in flow. */
      .page {
        position: relative;
        width: 100%;
        min-height: 100vh;
      }
      .page.hidden {
        display: none !important;
      }
      .page.active {
        display: block;
      }

      /* ===== FIXED UI ===== */
      #cursor {
        position: fixed;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: radial-gradient(circle, var(--rose), var(--lavender));
        pointer-events: none;
        z-index: 99999;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 10px var(--blush);
      }
      #cursor-trail {
        position: fixed;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1.5px solid var(--rose);
        pointer-events: none;
        z-index: 99998;
        transform: translate(-50%, -50%);
        opacity: 0.5;
        transition:
          left 0.22s var(--ease),
          top 0.22s var(--ease) !important;
      }
      #theme-toggle {
        position: fixed;
        top: 18px;
        right: 20px;
        z-index: 9000;
        background: var(--toggle-bg);
        border: 1.5px solid var(--toggle-border);
        border-radius: 50px;
        padding: 6px 18px;
        font-family: var(--ff-e);
        font-size: 0.88rem;
        letter-spacing: 0.04em;
        color: var(--toggle-color);
        cursor: none;
        backdrop-filter: blur(12px);
      }
      #theme-toggle:hover {
        transform: scale(1.06) !important;
      }
      #page-dots {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 9000;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--dot-inactive);
        cursor: none;
      }
      .dot.active {
        background: var(--rose);
        transform: scale(1.4) !important;
      }
      #sound-indicator {
        position: fixed;
        bottom: 60px;
        left: 20px;
        display: flex;
        gap: 3px;
        align-items: flex-end;
        height: 24px;
        z-index: 8000;
        opacity: 0;
        transition: opacity 0.5s !important;
      }
      #sound-indicator.playing {
        opacity: 1;
      }
      .wave-bar {
        width: 4px;
        border-radius: 2px;
        background: var(--rose);
        animation: wave 1s ease-in-out infinite;
      }
      .wave-bar:nth-child(2) {
        animation-delay: 0.15s;
      }
      .wave-bar:nth-child(3) {
        animation-delay: 0.3s;
      }
      .wave-bar:nth-child(4) {
        animation-delay: 0.45s;
      }
      @keyframes wave {
        0%,
        100% {
          height: 6px;
        }
        50% {
          height: 20px;
        }
      }

      /* =====================================================
   POWDER BURST INTRO OVERLAY
===================================================== */
      #burst-overlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: all;
        transition: none;
      }
      #burst-overlay.dissolving {
        transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1) 0.05s;
        opacity: 0;
        pointer-events: none;
      }
      #burst-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      /* The compression orb — white background means orb is a dark/colored dot */
      #burst-orb {
        position: relative;
        z-index: 2;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 38% 35%,
          #ff9ecc 0%,
          #c084e8 55%,
          #7c4dcc 100%
        );
        box-shadow:
          0 0 12px 5px rgba(192, 100, 220, 0.55),
          0 0 30px 12px rgba(192, 100, 220, 0.25);
        opacity: 0;
        transform: scale(0);
        transition: none;
      }
      #burst-orb.orb-appear {
        transition:
          opacity 0.4s ease,
          transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        opacity: 1;
        transform: scale(1);
      }
      #burst-orb.orb-compress {
        transition: transform 0.18s cubic-bezier(0.55, 0, 0.45, 1) !important;
        transform: scale(0.42) !important;
      }
      #burst-orb.orb-gone {
        opacity: 0 !important;
        transition: opacity 0.08s !important;
      }

      /* =====================================================
   PAGE 1 — LANDING
===================================================== */
      #page1 {
        background: linear-gradient(
          135deg,
          var(--p1-a) 0%,
          var(--p1-b) 40%,
          var(--p1-c) 80%,
          var(--p1-d) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
      }
      #particle-canvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        width: 100%;
        height: 100%;
      }
      .landing-content {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 2rem;
      }
      .crown-icon {
        font-size: 3.5rem;
        display: block;
        margin-bottom: 1rem;
        animation: floatCrown 3s ease-in-out infinite;
      }
      @keyframes floatCrown {
        0%,
        100% {
          transform: translateY(0) rotate(-5deg);
        }
        50% {
          transform: translateY(-14px) rotate(5deg);
        }
      }
      .landing-title {
        font-family: var(--ff-d);
        font-size: clamp(2.8rem, 8vw, 6rem);
        font-weight: 700;
        background: linear-gradient(135deg, #c0528a, #7b52ab, #d4587e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.1;
        margin-bottom: 0.5rem;
      }
      .landing-sub {
        font-family: var(--ff-s);
        font-size: clamp(1.2rem, 3.5vw, 2rem);
        color: var(--text-sub);
        opacity: 0.9;
        margin-bottom: 2.5rem;
        min-height: 2.5rem;
      }
      .typing-cursor {
        display: inline-block;
        width: 2px;
        height: 1.1em;
        background: var(--rose);
        margin-left: 3px;
        vertical-align: middle;
        animation: blink 0.75s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      .btn-enter {
        display: inline-block;
        padding: 14px 48px;
        background: linear-gradient(135deg, var(--rose), var(--lavender));
        color: #fff;
        border: none;
        border-radius: 50px;
        font-family: var(--ff-d);
        font-size: 1.1rem;
        letter-spacing: 0.08em;
        cursor: none;
        box-shadow: 0 8px 30px rgba(200, 100, 150, 0.35);
        position: relative;
        overflow: hidden;
      }
      .btn-enter::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        border-radius: inherit;
      }
      .btn-enter:hover {
        transform: translateY(-3px) scale(1.04) !important;
        box-shadow: 0 14px 40px rgba(200, 100, 150, 0.5) !important;
      }
      .float-heart {
        position: absolute;
        animation: floatUp linear infinite;
        opacity: 0.75;
        pointer-events: none;
        user-select: none;
      }
      @keyframes floatUp {
        0% {
          opacity: 0.7;
          transform: translateY(0) scale(1) rotate(0);
        }
        100% {
          opacity: 0;
          transform: translateY(-110vh) scale(0.4) rotate(30deg);
        }
      }

      /* =====================================================
   PAGE 2 — GALLERY  (cinematic collage background)
===================================================== */
      #page2 {
        background: linear-gradient(
          160deg,
          var(--p2-a) 0%,
          var(--p2-b) 50%,
          var(--p2-c) 100%
        );
        min-height: 100vh;
        position: relative;
        padding-bottom: 80px;
        /* z-index:auto keeps stacking context open so fixed children (collage) show through
     while page2-inner content at z-index:2 floats above the fixed collage */
        isolation: auto;
      }

      /* =====================================================
   COLLAGE BACKGROUND — No-crop, blurred-fill, auto-rotate
===================================================== */
      #collage-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(3, 33.33vh);
        gap: 3px;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }
      #collage-bg.active {
        display: grid;
      }
      #collage-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--collage-veil);
        z-index: 1;
        pointer-events: none;
        display: none;
      }
      #collage-overlay.active {
        display: block;
      }
      .page2-inner {
        position: relative;
        z-index: 2;
      }

      /* --- Tile wrapper --- */
      .collage-tile {
        position: relative;
        overflow: hidden;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000; /* fallback behind blurred fill */
        opacity: 0;
        transform: scale(0.72) translateY(38px);
        filter: blur(18px) brightness(0.45) saturate(0);
        transition: none;
        will-change: transform, opacity, filter;
      }

      /* Blurred background fill — stretches to cover the whole tile */
      .collage-tile .tile-blur-bg {
        position: absolute;
        inset: -12px; /* slightly oversized so edges don't show hard cut */
        background-size: cover;
        background-position: center;
        filter: blur(14px) brightness(0.6) saturate(0.8);
        transform: scale(1.08); /* compensate for blur edge bleed */
        z-index: 0;
        border-radius: 6px;
        pointer-events: none;
      }

      /* Actual image — contained, no crop */
      .collage-tile .tile-img {
        position: relative;
        z-index: 1;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
        display: block;
        border-radius: 3px;
        /* gentle drop shadow so image floats above blurred bg */
        filter: drop-shadow(0 4px 18px rgba(0, 0, 0, 0.35));
        transition:
          transform 0.6s ease,
          filter 0.6s ease;
        will-change: transform;
      }

      /* Phase 1 — fly in */
      .collage-tile.assembling {
        transition:
          opacity 1.3s cubic-bezier(0.22, 1, 0.36, 1),
          transform 1.5s cubic-bezier(0.22, 1, 0.36, 1),
          filter 1.3s cubic-bezier(0.22, 1, 0.36, 1);
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0) brightness(1) saturate(1);
      }

      /* Phase 2 — dreamy multi-axis float
   Each tile gets its own unique animation via --float-x / --float-y / --float-dur / --float-delay
   so tiles drift independently — no synchronized bobbing */
      .collage-tile.floating {
        animation:
          tileFloatY var(--float-dur, 7s) ease-in-out infinite
            var(--float-delay, 0s),
          tileFloatX var(--float-dur2, 9s) ease-in-out infinite
            var(--float-delay2, 0s),
          tileBreath var(--float-dur3, 11s) ease-in-out infinite
            var(--float-delay3, 0s);
      }
      /* vertical drift */
      @keyframes tileFloatY {
        0%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(calc(var(--fy, -7px)));
        }
        70% {
          transform: translateY(calc(var(--fy2, 4px)));
        }
      }
      /* horizontal drift — layered via the img element so it compounds */
      @keyframes tileFloatX {
        0%,
        100% {
          margin-left: 0;
        }
        40% {
          margin-left: calc(var(--fx, -5px));
        }
        80% {
          margin-left: calc(var(--fx2, 3px));
        }
      }
      /* scale breath */
      @keyframes tileBreath {
        0%,
        100% {
          opacity: 1;
          filter: brightness(1) saturate(1);
        }
        50% {
          opacity: 0.93;
          filter: brightness(1.04) saturate(1.05);
        }
      }

      /* Phase 3 — shimmer sweep */
      .collage-tile::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 2;
        background: linear-gradient(
          105deg,
          transparent 30%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 70%
        );
        transform: translateX(-110%);
        transition: none;
        pointer-events: none;
        border-radius: 6px;
      }
      .collage-tile.shimmer::after {
        transition: transform 1.2s ease;
        transform: translateX(160%);
      }

      /* --- Rotation fade-out / fade-in — tuned for fast 2-4s cycle --- */
      .collage-tile.tile-leaving {
        transition:
          opacity 0.55s ease,
          transform 0.55s ease,
          filter 0.55s ease !important;
        animation: none !important; /* pause float while leaving */
        opacity: 0 !important;
        transform: scale(0.94) !important;
        filter: blur(6px) brightness(0.45) saturate(0) !important;
      }
      .collage-tile.tile-entering {
        animation: none !important;
        opacity: 0;
        transform: scale(0.9);
        filter: blur(12px) brightness(0.4) saturate(0);
        transition: none;
      }
      .collage-tile.tile-entering.tile-in {
        transition:
          opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.8s cubic-bezier(0.22, 1, 0.36, 1),
          filter 0.7s ease !important;
        opacity: 1;
        transform: scale(1);
        filter: blur(0) brightness(1) saturate(1);
      }

      /* --- Responsive grid --- */
      @media (max-width: 900px) {
        #collage-bg {
          grid-template-columns: repeat(3, 1fr);
          grid-template-rows: repeat(4, 25vh);
        }
      }
      @media (max-width: 560px) {
        #collage-bg {
          grid-template-columns: repeat(2, 1fr);
          grid-template-rows: repeat(5, 20vh);
        }
      }

      /* ---- Page 2 content ---- */
      .page2-hero {
        text-align: center;
        padding: 4rem 1rem 2rem;
        background: var(--hero-band);
        border-bottom: 1px solid var(--hero-band-b);
        backdrop-filter: blur(6px);
      }
      .page2-hero h2 {
        font-family: var(--ff-d);
        font-size: clamp(2rem, 5vw, 3.5rem);
        background: linear-gradient(135deg, #b054a0, #7b52ab);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .page2-hero p {
        font-family: var(--ff-e);
        font-size: 1.1rem;
        color: var(--text-sub);
        opacity: 0.85;
        margin-top: 0.5rem;
      }

      /* Gallery grid */
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        max-width: 1100px;
        margin: 32px auto 0;
        padding: 0 20px;
      }
      .gallery-card {
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        cursor: none;
        aspect-ratio: 4/5;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        box-shadow: 0 6px 30px var(--card-shadow);
      }
      .gallery-card:hover {
        transform: translateY(-8px) scale(1.02) !important;
        box-shadow: 0 16px 50px var(--card-shadow-h) !important;
      }
      .gallery-card .photo-bg {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 3.5rem;
        text-align: center;
        padding: 1rem;
      }
      .gallery-card .img-bg {
        padding: 0;
        overflow: hidden;
      }
      .gallery-card .img-bg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.4s ease !important;
      }
      .gallery-card:hover .img-bg img {
        transform: scale(1.07);
      }
      .gallery-card .photo-bg span {
        font-family: var(--ff-s);
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.9);
        margin-top: 0.5rem;
      }
      .gallery-card .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(80, 20, 60, 0.6) 0%,
          transparent 60%
        );
        opacity: 0;
        display: flex;
        align-items: flex-end;
        padding: 16px;
        color: #fff;
        font-family: var(--ff-s);
        font-size: 1rem;
        transition: opacity 0.35s !important;
      }
      .gallery-card:hover .overlay {
        opacity: 1;
      }

      /* Timeline */
      .timeline-section {
        max-width: 700px;
        margin: 60px auto 0;
        padding: 0 20px;
      }
      .timeline-section h3 {
        font-family: var(--ff-d);
        font-size: 2rem;
        text-align: center;
        margin-bottom: 2rem;
        background: linear-gradient(135deg, #c0528a, #7b52ab);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .timeline-item {
        display: flex;
        gap: 20px;
        margin-bottom: 2rem;
        align-items: flex-start;
        opacity: 0;
        transform: translateX(-30px);
        transition:
          opacity 0.6s,
          transform 0.6s !important;
      }
      .timeline-item.visible {
        opacity: 1;
        transform: none;
      }
      .timeline-dot {
        flex-shrink: 0;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        background: linear-gradient(135deg, var(--rose), var(--lavender));

   PAGE 3 — MAKEUP / WISH
   Critical rules:
   • No overflow:hidden (content must scroll freely)
   • position:absolute canvases inside their containers
   • makeup-float: position:absolute (NOT fixed), % coords
   • padding-top is tight — no extra space
===================================================== */
      #page3 {
        background: linear-gradient(
          150deg,
          #3d0a2a 0%,
          #6b1a4a 40%,
          #2a0a3d 80%,

        position: relative;
        z-index: 2;
      }
      .makeup-float {
        position: absolute;
        opacity: 0.3;
        animation: spinFloat linear infinite;
        pointer-events: none;
        z-index: 1;
      }
      @keyframes spinFloat {
        0% {
          transform: translateY(0) rotate(0);

        50% {
          transform: translateY(-20px) rotate(180deg);
        }
        100% {

          filter 0.8s ease,
          box-shadow 0.3s ease,
          border-color 0.3s ease !important;
        position: relative;
        overflow: hidden;

        inset: 0;

      .story-modal-close:hover {
        color: #fff;

      /* ---- Scroll-reveal classes for ALL page-3 elements ---- */
      /* Base hidden state applied by JS before IntersectionObserver fires */
      .sr-hidden {
        opacity: 0;
        transform: translateY(52px) scale(0.96);
        filter: blur(5px);
        transition:
          opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
          transform 1s cubic-bezier(0.22, 1, 0.36, 1),
          filter 0.85s ease !important;
      }
      .sr-hidden.sr-visible {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
      /* Eyebrow line slides in from left */
      .sr-left {
        opacity: 0;
        transform: translateX(-40px);
        filter: blur(4px);
        transition:
          opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.9s cubic-bezier(0.22, 1, 0.36, 1),
          filter 0.8s ease !important;
      }
      .sr-left.sr-visible {
        opacity: 1;
        transform: translateX(0);
        filter: blur(0);
      }
      /* Heading drops in from top */
      .sr-top {
        opacity: 0;
        transform: translateY(-36px) scale(0.97);
        filter: blur(4px);
        transition:
          opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
          transform 1s cubic-bezier(0.22, 1, 0.36, 1),
          filter 0.85s ease !important;
      }
      .sr-top.sr-visible {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
      /* Big wish text: scale + glow in */
      .sr-wish {
        opacity: 0;
        transform: scale(0.88);
        filter: blur(8px) brightness(0.6);
        transition:
          opacity 1.1s cubic-bezier(0.22, 1, 0.36, 1),

      .sr-wish.sr-visible {

        transform: scale(1);
        filter: blur(0) brightness(1);
      }
      .story-block h4 {
        font-family: var(--ff-d);
        font-size: 1.2rem;
        color: var(--blush);
        margin-bottom: 0.5rem;
      }
      .story-block p {

        }

          padding: 20px;
        }

      /* --- Preload all images silently --- */
      function preloadAllImages(cb) {
        if (_preloaded) {
          cb();
          return;
        }
        let done = 0;
        ALL_IMGS.forEach((src) => {
          const img = new Image();
          img.onload = img.onerror = () => {

      /* --- Build one tile's inner HTML (blurred bg + contained image) --- */
      function makeTileContent(src) {
        // blurBg div uses background-image so it fills/covers the cell
        const wrap = document.createDocumentFragment();
        const bg = document.createElement("div");
        bg.className = "tile-blur-bg";
        bg.style.backgroundImage = `url('${src}')`;

        const img = document.createElement("img");
        img.className = "tile-img";
        img.src = src;
        img.alt = "memory";
        img.onerror = function () {
          bg.style.backgroundImage = "linear-gradient(135deg,#f9a8d4,#c084fc)";
          this.style.display = "none";
        };

        wrap.appendChild(bg);
        wrap.appendChild(img);
        return wrap;
      }

      /* --- Helper: random signed value between ±lo and ±hi px --- */
      function rng(lo, hi) {
        return (

      /* =====================================================

   Visual target: dense coloured powder burst on white,

     0ms    — white screen, small orb fades in

===================================================== */
      (function () {
        /* ── Colour palette: pink/rose/magenta (matching site theme) ── */
        const ZONES = [
          {
            cols: ["#ff6eb4", "#ff3d9a", "#ff85c0", "#ffadd6", "#ffffff"],
            weight: 0.3,
          }, // hot pink core
          {
            cols: ["#c76bdd", "#a44ec9", "#d48ded", "#e8c5f7", "#ffffff"],
            weight: 0.25,
          }, // purple
          {
            cols: ["#ff9ed2", "#ffcce8", "#ffd6f0", "#fff0f8", "#ffffff"],
            weight: 0.25,
          }, // blush/pastel
          {
            cols: ["#f9c5d1", "#ffd6e8", "#ffe8f2", "#ffffff", "#ffb8d4"],
            weight: 0.2,

        let canvas,

          W,
          H,
          animId = null;
        let burstFired = false;
        // Three particle layers for depth
        let coreP = [],
          cloudP = [],
          dustP = [];

        /* ── Pick colour from weighted zones ── */
        function pickCol() {
          const r = Math.random(),
            zone =
              ZONES.find(
                (_, i, a) =>
                  r < a.slice(0, i + 1).reduce((s, z) => s + z.weight, 0),
              ) || ZONES[0];
          return zone.cols[Math.floor(Math.random() * zone.cols.length)];
        }

        /* ── Convert hex → rgba string ── */
        function rgba(hex, a) {
          const r = parseInt(hex.slice(1, 3), 16),
            g = parseInt(hex.slice(3, 5), 16),
            b = parseInt(hex.slice(5, 7), 16);
          return `rgba(${r},${g},${b},${a.toFixed(3)})`;
        }

        /* ── Core streak particles — fast, elongated, directional ── */
        function makeStreak(cx, cy) {
          const angle = Math.random() * Math.PI * 2;
          // Bias: more horizontal spread, slight upward lift like real powder
          const spd = 8 + Math.random() * 18;
          const col = pickCol();
          return {
            x: cx,
            y: cy,
            vx: Math.cos(angle) * spd * (0.7 + Math.random() * 0.6),
            vy:
              Math.sin(angle) * spd * (0.5 + Math.random() * 0.5) -
              Math.random() * 4,
            len: 18 + Math.random() * 55, // streak length
            width: 3 + Math.random() * 9,
            col,
            alpha: 0.7 + Math.random() * 0.3,
            decay: 0.01 + Math.random() * 0.008,
            drag: 0.93 + Math.random() * 0.03,
            grav: 0.06 + Math.random() * 0.08,
            turbX: (Math.random() - 0.5) * 0.4,
            turbY: (Math.random() - 0.5) * 0.2,
          };
        }

        /* ── Cloud puff particles — large soft blobs that form the billowing mass ── */
        function makePuff(cx, cy, wave) {
          const angle = Math.random() * Math.PI * 2;
          const spd =
            (2 + Math.random() * 7) *
            (wave === 0 ? 1.4 : wave === 1 ? 1.0 : 0.6);
          const size = 28 + Math.random() * 90;
          const col = pickCol();
          return {
            x: cx + (Math.random() - 0.5) * 40 * (wave + 1),
            y: cy + (Math.random() - 0.5) * 30 * (wave + 1),
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - Math.random() * 1.5,
            size,

            col,
            alpha: 0.28 + Math.random() * 0.32,

        /* ── Fine dust — tiny particles, slow drift, long life ── */
        function makeDust(cx, cy) {

          return {
            x: cx + (Math.random() - 0.5) * W * 0.6,

            size: 2 + Math.random() * 6,

            decay: 0.0015 + Math.random() * 0.002,
            drag: 0.99,
            grav: 0.008,

        /* ── FIRE THE BURST ── */
        function fireBurst(cx, cy) {
          // Instant core streaks — 200 fast directional tendrils
          for (let i = 0; i < 200; i++) coreP.push(makeStreak(cx, cy));

          // Cloud puffs in 4 expanding waves
          for (let w = 0; w < 4; w++) {
            const count = w === 0 ? 80 : w === 1 ? 100 : w === 2 ? 80 : 60;
            setTimeout(() => {
              for (let i = 0; i < count; i++) cloudP.push(makePuff(cx, cy, w));
            }, w * 90);
          }

          // Fine dust settles last
          setTimeout(() => {
            for (let i = 0; i < 120; i++) dustP.push(makeDust(cx, cy));
          }, 250);
        }

        /* ── Draw a streak (elongated capsule in direction of motion) ── */
        function drawStreak(p) {
          const spd = Math.hypot(p.vx, p.vy);
          if (spd < 0.1) return;
          const nx = p.vx / spd,
            ny = p.vy / spd;
          const len = Math.min(p.len, spd * 4);

          ctx.save();
          ctx.globalAlpha = Math.max(0, p.alpha);
          const grad = ctx.createLinearGradient(
            p.x,
            p.y,
            p.x - nx * len,
            p.y - ny * len,

          grad.addColorStop(0, rgba(p.col, 0.9));
          grad.addColorStop(0.4, rgba(p.col, 0.55));
          grad.addColorStop(1, rgba(p.col, 0));
          ctx.strokeStyle = grad;
          ctx.lineWidth = p.width * p.alpha;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x - nx * len, p.y - ny * len);
          ctx.stroke();
          ctx.restore();

        function drawPuff(p) {

          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);

          grad.addColorStop(0.35, rgba(p.col, 0.5));
          grad.addColorStop(0.7, rgba(p.col, 0.2));
          grad.addColorStop(1, rgba(p.col, 0));
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.restore();
        }

        function drawDust(p) {
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.alpha);
          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
          grad.addColorStop(0, rgba(p.col, 0.9));
          grad.addColorStop(1, rgba(p.col, 0));
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.restore();
        }

        /* ── Main draw loop ── */
        function draw() {
          // Fill white each frame — powder on white background
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, W, H);

          // 1. Cloud puffs first (back layer, large)
          for (let i = cloudP.length - 1; i >= 0; i--) {
            const p = cloudP[i];
            p.x += p.vx + p.turbX;
            p.y += p.vy + p.turbY;
            p.vx *= p.drag;
            p.vy *= p.drag;
            p.vy += p.grav;
            p.alpha -= p.decay;
            p.size = Math.min(p.size + p.grow, p.maxSize);
            if (p.alpha <= 0) {
              cloudP.splice(i, 1);
              continue;
            }
            drawPuff(p);
          }

          // 2. Core streaks on top (give speed/energy impression)
          for (let i = coreP.length - 1; i >= 0; i--) {
            const p = coreP[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= p.drag;
            p.vy *= p.drag;
            p.vy += p.grav;
            p.alpha -= p.decay;
            if (p.alpha <= 0) {
              coreP.splice(i, 1);
              continue;
            }
            drawStreak(p);
          }

          // 3. Fine dust on top
          for (let i = dustP.length - 1; i >= 0; i--) {
            const p = dustP[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= p.drag;
            p.vy *= p.drag;
            p.vy += p.grav;
            p.alpha -= p.decay;
            if (p.alpha <= 0) {
              dustP.splice(i, 1);
              continue;
            }
            drawDust(p);
          }

          if (coreP.length || cloudP.length || dustP.length || !burstFired) {
            animId = requestAnimationFrame(draw);
          }
        }

        /* ── Whoosh sound ── */
        function playWhoosh() {
          try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            const bufSize = Math.floor(ac.sampleRate * 1.0);
            const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
            const d = buf.getChannelData(0);
            let b0 = 0,
              b1 = 0,
              b2 = 0,
              b3 = 0,
              b4 = 0,
              b5 = 0,
              b6 = 0;
            for (let i = 0; i < bufSize; i++) {
              const w = Math.random() * 2 - 1;
              b0 = 0.99886 * b0 + w * 0.0555179;
              b1 = 0.99332 * b1 + w * 0.0750759;
              b2 = 0.969 * b2 + w * 0.153852;
              b3 = 0.8665 * b3 + w * 0.3104856;
              b4 = 0.55 * b4 + w * 0.5329522;
              b5 = -0.7616 * b5 - w * 0.016898;
              d[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + w * 0.5362) * 0.13;
              b6 = w * 0.115926;
            }
            const src = ac.createBufferSource();
            src.buffer = buf;
            const gain = ac.createGain();
            const flt = ac.createBiquadFilter();
            flt.type = "lowpass";
            flt.frequency.value = 2200;
            src.connect(flt);
            flt.connect(gain);
            gain.connect(ac.destination);
            gain.gain.setValueAtTime(0, ac.currentTime);
            gain.gain.linearRampToValueAtTime(0.45, ac.currentTime + 0.08);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.9);
            src.start();
            src.stop(ac.currentTime + 1.0);
          } catch (e) {}
        }

        /* ── Orchestrator ── */
        window.runBurstIntro = function () {
          const overlay = document.getElementById("burst-overlay");
          const orb = document.getElementById("burst-orb");
          canvas = document.getElementById("burst-canvas");
          ctx = canvas.getContext("2d");

          function resize() {
            W = canvas.width = innerWidth;
            H = canvas.height = innerHeight;
          }
          resize();
          window.addEventListener("resize", resize);
          // start drawing white bg immediately
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, W, H);

          const cx = W / 2,
            cy = H / 2;

          // Step 1 — orb appears
          setTimeout(() => orb.classList.add("orb-appear"), 80);

          // Step 2 — compress
          setTimeout(() => {
            orb.classList.remove("orb-appear");
            orb.classList.add("orb-compress");
          }, 750);

          // Step 3 — BURST
          setTimeout(() => {
            orb.classList.add("orb-gone");
            burstFired = true;
            playWhoosh();
            fireBurst(cx, cy);
            draw();
          }, 900);

          // Step 4 — dissolve overlay (canvas still drawing underneath fades out)
          setTimeout(() => overlay.classList.add("dissolving"), 2800);

          // Step 5 — remove
          setTimeout(() => {
            overlay.remove();
            cancelAnimationFrame(animId);
          }, 3900);
        };
      })();

      /* ===== DOM READY ===== */
      window.addEventListener("DOMContentLoaded", () => {
        // Restore saved theme (silent — no click sound on load)
        if (localStorage.getItem("bdayTheme") === "dark")
          applyTheme(true, false);

        // Build gallery
        const grid = document.getElementById("gallery-grid");
        galleryData.forEach((item) => {
          const card = document.createElement("div");
          card.className = "gallery-card";
          card.innerHTML = `<div class="photo-bg img-bg"><img src="${item.img}" alt="${item.caption}" loading="lazy" onerror="this.parentElement.style.background='linear-gradient(135deg,#f9a8d4,#c084fc)';this.style.display='none'"/></div><div class="overlay">${item.caption}</div>`;
          card.onclick = () => openModalImg(item.img, item.caption);
          grid.appendChild(card);
        });

        // Build timeline
        const tc = document.getElementById("timeline-container");
        timelineData.forEach((item) => {
          const el = document.createElement("div");
          el.className = "timeline-item";
          el.innerHTML = `<div class="timeline-dot">${item.emoji}</div><div class="timeline-text"><h4>${item.year} \u2014 ${item.title}</h4><p>${item.text}</p></div>`;
          tc.appendChild(el);
        });

        // Build chapter cards (3 clickable story blocks)
        const ss = document.getElementById("story-section");
        storyData.forEach((item, i) => {
          const el = document.createElement("div");
          el.className = "story-block";
          el.innerHTML = `
      <span class="story-emoji">${item.emoji}</span>
      <span class="story-chapter">${item.chapter}</span>
      <h4>${item.title}</h4>
      <p class="story-preview">${item.preview}</p>
      <span class="read-more">Read story &#8594;</span>`;
          el.onclick = () => openStoryModal(item);
          ss.appendChild(el);
        });

        spawnHearts();
        spawnMakeupIcons();
        initParticles();
        document.getElementById("wish-text").textContent =
          `Happy Birthday ${BIRTHDAY_GIRL} \uD83C\uDF82\uD83D\uDC96`;

        // 🌸 Run powder burst first — typing starts as overlay dissolves
        runBurstIntro();
        setTimeout(() => {
          typeText(
            document.getElementById("landing-title"),
            `Hey ${BIRTHDAY_GIRL} \uD83D\uDC96`,
            80,
            () => {
              typeText(
                document.getElementById("landing-sub"),
                "Something special is waiting for you...",
                50,
              );
            },
          );
        }, 2900);
      });

      /* ===== PAGE 3 SCROLL REVEAL =====
   IntersectionObserver watches every .sr-hidden and .story-block element.
   When an element enters the viewport it gains the visible class.
   A small cascade delay per element gives a wave-like feel.
   Called fresh each time page 3 is shown so re-entrances work. */
      function staggerRevealStories() {
        // Reset all animated elements to hidden
        document
          .querySelectorAll(".story-block,.sr-hidden,.sr-left,.sr-top,.sr-wish")
          .forEach((el) => {
            el.classList.remove("visible", "sr-visible");
          });

        // Observe story blocks (scroll reveal)
        const storyObs = new IntersectionObserver(
          (entries, obs) => {
            entries.forEach((e) => {
              if (!e.isIntersecting) return;
              const idx = Array.from(
                document.querySelectorAll(".story-block"),
              ).indexOf(e.target);
              setTimeout(() => e.target.classList.add("visible"), idx * 120);
              obs.unobserve(e.target);
            });
          },
          { threshold: 0.15, rootMargin: "0px 0px -40px 0px" },
        );
        document
          .querySelectorAll(".story-block")
          .forEach((b) => storyObs.observe(b));

        // Observe sr-* elements (hero, wish, button)
        const srObs = new IntersectionObserver(
          (entries, obs) => {
            entries.forEach((e) => {
              if (!e.isIntersecting) return;
              e.target.classList.add("sr-visible");
              obs.unobserve(e.target);
            });
          },
          { threshold: 0.12, rootMargin: "0px 0px -30px 0px" },
        );
        document
          .querySelectorAll(".sr-hidden,.sr-left,.sr-top,.sr-wish")
          .forEach((el) => srObs.observe(el));
      }

      /* ===== PARTICLES (page 1) ===== */
      function initParticles() {
        const canvas = document.getElementById("particle-canvas"),
          ctx = canvas.getContext("2d");
        let W,
          H,
          ps = [];
        function resize() {
          W = canvas.width = innerWidth;
          H = canvas.height = innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);
        const SYM = [
          "\u2736",
          "\u2737",
          "\u22C6",
          "\u273A",
          "\u274B",
          "\u273F",
          "\u25CC",
          "\u00B7",
        ];
        const COL = ["#f4a0b5", "#c9b8e8", "#ffd6b0", "#f9c5d1", "#d8bdf9"];
        function mk() {
          return {
            x: Math.random() * innerWidth,
            y: Math.random() * innerHeight,
            sym: SYM[Math.floor(Math.random() * SYM.length)],
            color: COL[Math.floor(Math.random() * COL.length)],
            size: Math.random() * 14 + 6,
            vx: (Math.random() - 0.5) * 0.4,
            vy: -(Math.random() * 0.5 + 0.2),
            alpha: Math.random() * 0.6 + 0.3,
            life: Math.random() * 200 + 100,
            age: 0,
          };
        }
        for (let i = 0; i < 80; i++) ps.push(mk());
        (function draw() {
          ctx.clearRect(0, 0, W, H);
          ps.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.age++;
            ctx.globalAlpha = p.alpha * (1 - p.age / p.life);
            ctx.fillStyle = p.color;
            ctx.font = p.size + "px serif";
            ctx.fillText(p.sym, p.x, p.y);
            if (p.age >= p.life) ps[i] = mk();
          });
          ctx.globalAlpha = 1;
          requestAnimationFrame(draw);
        })();
      }

      /* ===== FLOATING HEARTS (page 1) ===== */
      function spawnHearts() {
        const p1 = document.getElementById("page1");
        const s = [
          "\uD83D\uDC96",
          "\uD83D\uDC95",
          "\u2728",
          "\uD83C\uDF38",
          "\uD83D\uDC97",
          "\u2B50",
          "\uD83D\uDCAB",
          "\uD83C\uDF37",
        ];
        for (let i = 0; i < 18; i++) {
          const h = document.createElement("div");
          h.className = "float-heart";
          h.textContent = s[Math.floor(Math.random() * s.length)];
          h.style.cssText = `left:${Math.random() * 100}%;bottom:-40px;font-size:${Math.random() * 1.2 + 0.7}rem;animation-duration:${Math.random() * 10 + 8}s;animation-delay:${Math.random() * 10}s;`;
          p1.appendChild(h);
        }
      }

      /* ===== MAKEUP ICONS (page 3) =====
   position:absolute with % coords.
   % is relative to #page3 (positioned ancestor) — no viewport leak. */
      function spawnMakeupIcons() {
        const p3 = document.getElementById("page3");
        const ic = [
          "\uD83D\uDC84",
          "\uD83D\uDC8B",
          "\u2728",
          "\uD83D\uDC85",
          "\uD83C\uDF38",
          "\uD83D\uDC8E",
          "\uD83E\uDEDE",
          "\uD83C\uDF37",
        ];
        ic.concat(ic).forEach((icon) => {
          const el = document.createElement("div");
          el.className = "makeup-float";
          el.textContent = icon;
          el.style.cssText = `left:${Math.random() * 90}%;top:${10 + Math.random() * 75}%;font-size:${Math.random() * 1.5 + 1.2}rem;animation-duration:${Math.random() * 8 + 6}s;animation-delay:${Math.random() * 4}s;`;
          p3.appendChild(el);
        });
      }

      /* ===== GLITTER CANVAS (page 3) ===== */
      function initGlitter() {
        const c = document.getElementById("glitter-canvas"),
          ctx = c.getContext("2d");
        c.width = innerWidth;
        c.height = innerHeight;
        const COLS = ["#ffd6e7", "#e8c5f7", "#ffd6b0", "#fff", "#f9c5d1"];
        const gs = Array.from({ length: 120 }, () => ({
          x: Math.random() * c.width,
          y: Math.random() * c.height,
          r: Math.random() * 2.5 + 0.5,
          alpha: Math.random(),
          speed: Math.random() * 0.015 + 0.005,
          phase: Math.random() * Math.PI * 2,
        }));
        (function draw() {
          ctx.clearRect(0, 0, c.width, c.height);
          gs.forEach((g) => {
            g.phase += g.speed;
            g.alpha = 0.3 + 0.5 * Math.abs(Math.sin(g.phase));
            ctx.globalAlpha = g.alpha;
            ctx.beginPath();
            ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
            ctx.fillStyle = COLS[Math.floor(Math.random() * COLS.length)];
            ctx.fill();
          });
          ctx.globalAlpha = 1;
          if (currentPage === 3) requestAnimationFrame(draw);
        })();
      }

      /* ===== FIREWORKS (page 3) ===== */
      function startFireworks() {
        const c = document.getElementById("firework-canvas2");
        const sec = document.getElementById("big-wish-section");
        c.width = sec.offsetWidth;
        c.height = sec.offsetHeight;
        const ctx = c.getContext("2d");
        const COLS = [
          "#f9c5d1",
          "#c9b8e8",
          "#ffd6b0",
          "#fff",
          "#e8c5f7",
          "#ffd6e7",
        ];
        let ps = [],
          frame = 0;
        function boom(x, y) {
          for (let i = 0; i < 60; i++) {
            const a = Math.random() * Math.PI * 2,
              s = Math.random() * 5 + 2;
            ps.push({
              x,
              y,
              vx: Math.cos(a) * s,
              vy: Math.sin(a) * s,
              alpha: 1,
              r: Math.random() * 3 + 1.5,
              color: COLS[Math.floor(Math.random() * COLS.length)],
              decay: Math.random() * 0.015 + 0.01,
              gy: 0.12,
            });
          }
        }
        (function draw() {
          ctx.clearRect(0, 0, c.width, c.height);
          frame++;
          if (frame % 55 === 0)
            boom(Math.random() * c.width, Math.random() * c.height * 0.7 + 30);
          ps.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += p.gy;
            p.vx *= 0.98;
            p.alpha -= p.decay;
            if (p.alpha <= 0) {
              ps.splice(i, 1);
              return;
            }
            ctx.globalAlpha = p.alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
          });
          ctx.globalAlpha = 1;
          if (currentPage === 3) requestAnimationFrame(draw);
        })();
        boom(c.width / 2, c.height / 3);
      }

      /* ===== CONFETTI ===== */
      function launchConfetti() {
        const COLS = [
          "#f4a0b5",
          "#c9b8e8",
          "#ffd6b0",
          "#f9c5d1",
          "#d8bdf9",
          "#fff",
          "#fcd34d",
        ];
        for (let i = 0; i < 90; i++) {
          const p = document.createElement("div");
          p.className = "confetti-piece";
          p.style.cssText = `left:${Math.random() * 100}vw;background:${COLS[Math.floor(Math.random() * COLS.length)]};transform:rotate(${Math.random() * 360}deg);animation-delay:${Math.random() * 1.2}s;animation-duration:${Math.random() * 2 + 2}s;width:${Math.random() * 10 + 6}px;height:${Math.random() * 14 + 6}px;border-radius:${Math.random() > 0.5 ? "50%" : "2px"};`;
          document.body.appendChild(p);
          setTimeout(() => p.remove(), 4000);
        }
        document.getElementById("hidden-msg").style.opacity = "1";
        playClickSound();
      }

      /* ===== MODAL ===== */
      function openModal(emoji, caption) {
        const ph = document.getElementById("modal-photo");
        ph.innerHTML = "";
        ph.textContent = emoji;
        document.getElementById("modal-caption").textContent = caption;
        document.getElementById("modal").classList.add("open");
        playClickSound();
      }
      function openModalImg(src, caption) {
        const ph = document.getElementById("modal-photo");
        ph.innerHTML = `<img src="${src}" alt="${caption}" style="width:100%;max-height:60vh;object-fit:contain;border-radius:12px;display:block;margin:0 auto"/>`;
        document.getElementById("modal-caption").textContent = caption;
        document.getElementById("modal").classList.add("open");
        playClickSound();
      }
      function closeModal() {
        document.getElementById("modal").classList.remove("open");
      }
      document.getElementById("modal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeModal();
      });

      /* ===== STORY CHAPTER MODAL ===== */
      function openStoryModal(item) {
        document.getElementById("sm-emoji").textContent = item.emoji;
        document.getElementById("sm-chapter").textContent = item.chapter;
        document.getElementById("sm-title").textContent = item.title;
        document.getElementById("sm-text").textContent = item.text;
        // scroll body back to top each open
        document.querySelector(".story-modal-body").scrollTop = 0;
        document.getElementById("story-modal").classList.add("open");
        playClickSound();
      }
      function closeStoryModal() {
        document.getElementById("story-modal").classList.remove("open");
      }
      document.getElementById("story-modal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeStoryModal();
      });

      /* ===== TIMELINE SCROLL REVEAL ===== */
      function initTimeline() {
        const obs = new IntersectionObserver(
          (es) =>
            es.forEach((e) => {
              if (e.isIntersecting) e.target.classList.add("visible");
            }),
          { threshold: 0.2 },
        );
        document
          .querySelectorAll(".timeline-item")
          .forEach((i) => obs.observe(i));
      }

      /* ===== BACKGROUND MUSIC (Web Audio API — no file needed) ===== */
      let audioCtx = null,
        musicPlaying = false;
      function startMusic() {
        if (musicPlaying) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const notes = [261.63, 293.66, 329.63, 349.23, 392, 440, 493.88];
          let idx = 0;
          function playNote() {
            if (!musicPlaying || !audioCtx) return;
            const osc = audioCtx.createOscillator(),
              gain = audioCtx.createGain(),
              flt = audioCtx.createBiquadFilter();
            flt.type = "lowpass";
            flt.frequency.value = 800;
            osc.connect(flt);
            flt.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = "sine";
            osc.frequency.value = notes[idx % notes.length] * 0.5;
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.3);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.8);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 2);
            idx++;
            setTimeout(playNote, 900 + Math.random() * 500);
          }
          musicPlaying = true;
          playNote();
          document.getElementById("sound-indicator").classList.add("playing");
        } catch (e) {}
      }

      /* ===== CLICK SOUND ===== */
      function playClickSound() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)(),
            osc = ctx.createOscillator(),
            gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 880;
          osc.type = "sine";
          gain.gain.setValueAtTime(0.12, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } catch (e) {}
      }

      /* ===== CUSTOM CURSOR ===== */
      const curEl = document.getElementById("cursor"),
        trEl = document.getElementById("cursor-trail");
      document.addEventListener("mousemove", (e) => {
        curEl.style.left = e.clientX + "px";
        curEl.style.top = e.clientY + "px";
        trEl.style.left = e.clientX + "px";
        trEl.style.top = e.clientY + "px";
      });

      /* ===== DARK / LIGHT THEME =====
   applyTheme(isDark, withSound)
   Toggles body.dark → all CSS token vars flip via cascade.
   Saves to localStorage for persistence across reloads. */
      function applyTheme(isDark, withSound) {
        if (withSound === undefined) withSound = true;
        darkMode = isDark;
        document.body.classList.toggle("dark", darkMode);
        document.getElementById("theme-toggle").textContent = darkMode
          ? "\u2600\uFE0F Light"
          : "\uD83C\uDF19 Dark";
        localStorage.setItem("bdayTheme", darkMode ? "dark" : "light");
        if (withSound) playClickSound();
      }
      function toggleTheme() {
        applyTheme(!darkMode);
      }

      /* ===== KEYBOARD NAVIGATION ===== */
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" || e.key === "ArrowDown")
          showPage(Math.min(3, currentPage + 1));
        if (e.key === "ArrowLeft" || e.key === "ArrowUp")
          showPage(Math.max(1, currentPage - 1));
      });
    </script>
  </body>
